<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Soundkeeper Mini App</title>
  <meta
    name="description"
    content="Telegram Mini App для локального прослушивания аудио, хранения треков, альбомов и плейлистов."
  >
  <link rel="preconnect" href="https://telegram.org">
  <link rel="preload" href="soundkeeper1.png" as="image">
  <link rel="stylesheet" href="styles.css">
  <script src="https://telegram.org/js/telegram-web-app.js?61" defer></script>
  <script src="app.js" defer></script>
</head>
<body class="is-splash-visible">
  <div class="app-splash" id="appSplash" aria-hidden="true">
    <div class="app-splash-backdrop" aria-hidden="true"></div>
    <div class="app-splash-core">
      <div class="app-splash-halo" aria-hidden="true"></div>
      <div class="app-splash-logo-shell">
        <img class="app-splash-logo" src="soundkeeper1.png" alt="">
        <span class="app-splash-scan" aria-hidden="true"></span>
      </div>
    </div>
  </div>

  <div class="app-shell">
    <aside class="shell-nav">
      <h1>Soundkeeper</h1>

      <nav class="main-nav" aria-label="Основная навигация">
        <button class="main-nav-button is-active" type="button" data-screen-target="home">Home</button>
        <button class="main-nav-button" type="button" data-screen-target="library">Library</button>
        <button class="main-nav-button" type="button" data-screen-target="statistics">Statistics</button>
      </nav>
    </aside>

    <div class="app-main">
      <header class="app-header">
        <h2 id="screenTitle">Home</h2>
      </header>

      <main class="screen-stack">
        <section class="screen is-active" id="homeScreen" data-screen="home">
          <section class="card import-card">
            <div class="card-heading">
              <h2>Добавить трек</h2>
            </div>

            <form id="trackForm" class="track-form">
              <div class="picker-row">
                <button class="ghost-button" id="openAudioPicker" type="button">Выбрать аудио</button>
                <button class="ghost-button" id="openCoverPicker" type="button">Выбрать обложку</button>
              </div>

              <div class="file-summary">
                <div>
                  <span class="summary-label">Аудио</span>
                  <p id="selectedAudioLabel">Файл не выбран</p>
                </div>
                <div>
                  <span class="summary-label">Обложка</span>
                  <p id="selectedCoverLabel">Не выбрана</p>
                </div>
              </div>

              <div class="form-grid">
                <label class="field">
                  <span>Название</span>
                  <input id="titleInput" name="title" maxlength="80" placeholder="Например, Night Drive">
                </label>

                <label class="field">
                  <span>Исполнитель</span>
                  <input id="artistInput" name="artist" maxlength="80" placeholder="Ваше имя или группа">
                </label>

                <label class="field">
                  <span>Альбом</span>
                  <input id="albumInput" name="album" maxlength="80" placeholder="Например, Midnight Tapes">
                </label>

                <label class="field">
                  <span>Длительность</span>
                  <input id="durationPreview" readonly value="Определится после выбора аудио">
                </label>
              </div>

              <div class="import-actions">
                <button class="primary-button" id="saveTrackButton" type="submit" disabled>Сохранить</button>
                <button class="ghost-button" id="clearDraftButton" type="button">Очистить</button>
              </div>
            </form>
          </section>
        </section>

        <section class="screen" id="libraryScreen" data-screen="library">
          <section class="card library-hub">
            <section class="library-section">
              <h3>Медиатека</h3>

              <button class="library-entry library-entry-main" id="allTracksButton" type="button" data-library-open="all">
                <span class="library-entry-art library-entry-art-glyph">♪</span>
                <span class="library-entry-copy">
                  <span class="library-entry-title">Все треки</span>
                  <span class="library-entry-meta" id="allTracksCount">0 треков</span>
                </span>
                <span class="library-entry-arrow">></span>
              </button>

              <div class="library-actions">
                <button class="ghost-button" id="openBulkAttachPicker" type="button">Подключить все файлы</button>
                <p class="library-note" id="bulkAttachStatus"></p>
              </div>
            </section>

            <section class="library-section">
              <div class="section-head">
                <h3>Альбомы</h3>
                <span id="albumCountLabel">0</span>
              </div>
              <div class="library-stack" id="albumList" aria-live="polite"></div>
            </section>

            <section class="library-section">
              <div class="section-head">
                <h3>Плейлисты</h3>
                <span id="playlistCountLabel">0</span>
              </div>

              <form class="playlist-create" id="playlistForm">
                <input id="playlistNameInput" maxlength="60" placeholder="Новый плейлист" aria-label="Название плейлиста">
                <button class="primary-button icon-button" id="createPlaylistButton" type="submit">+</button>
              </form>

              <div class="library-stack" id="playlistList" aria-live="polite"></div>
            </section>

            <section class="library-section">
              <div class="section-head">
                <h3>Исполнители</h3>
                <span id="artistCountLabel">0</span>
              </div>
              <div class="library-stack" id="artistList" aria-live="polite"></div>
            </section>
          </section>
        </section>

        <section class="screen" id="statisticsScreen" data-screen="statistics">
          <section class="card stats-card">
            <div class="stats-tabs" role="tablist" aria-label="Период статистики">
              <button class="stats-tab is-active" id="statsWeekTab" type="button" data-stats-range="week">За неделю</button>
              <button class="stats-tab" id="statsAllTimeTab" type="button" data-stats-range="all">За все время</button>
            </div>

            <section class="stats-section">
              <div class="section-head">
                <h3>Топ-10 треков</h3>
              </div>
              <div class="stats-list" id="statsTracksList" aria-live="polite"></div>
            </section>

            <section class="stats-section">
              <div class="section-head">
                <h3>Топ-10 исполнителей</h3>
              </div>
              <div class="stats-list" id="statsArtistsList" aria-live="polite"></div>
            </section>
          </section>
        </section>
      </main>
    </div>
  </div>

  <div class="collection-sheet is-hidden" id="collectionSheet" aria-hidden="true">
    <button class="collection-sheet-backdrop" id="closeCollectionSheet" type="button" aria-label="Закрыть"></button>

    <section class="collection-sheet-panel" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
      <header class="collection-sheet-topbar">
        <button class="ghost-icon" id="sheetBackButton" type="button" aria-label="Назад">&lt;</button>
        <span id="sheetType">Подборка</span>
      </header>

      <div class="collection-sheet-hero">
        <div class="collection-sheet-cover" id="sheetCoverWrap">
          <img id="sheetCover" alt="Обложка подборки">
          <div class="collection-sheet-placeholder" id="sheetCoverPlaceholder" aria-hidden="true">
            <span>SK</span>
          </div>
        </div>

        <h2 id="sheetTitle">Все треки</h2>
        <p id="sheetMeta"></p>
      </div>

      <div class="collection-sheet-actions">
        <button class="ghost-button" id="sheetPlayButton" type="button">По порядку</button>
        <button class="ghost-button" id="sheetShuffleButton" type="button">Перемешать</button>
        <button class="ghost-button is-hidden" id="sheetPlaylistCoverButton" type="button">Сменить обложку</button>
      </div>

      <div class="collection-track-list" id="sheetTrackList" aria-live="polite"></div>
    </section>
  </div>

  <div class="track-menu is-hidden" id="trackMenu" aria-hidden="true">
    <button class="track-menu-backdrop" id="closeTrackMenu" type="button" aria-label="Закрыть меню"></button>

    <section class="track-menu-panel" aria-modal="true" aria-labelledby="trackMenuTitle">
      <div class="track-menu-head">
        <h3 id="trackMenuTitle">Трек</h3>
        <p id="trackMenuSubtitle"></p>
      </div>

      <button class="track-menu-item" type="button" data-track-menu-action="queue">Добавить в очередь</button>
      <div class="track-menu-group" id="trackMenuPlaylistActions"></div>
      <button class="track-menu-item remove is-hidden" id="trackMenuRemoveButton" type="button" data-track-menu-action="remove-from-playlist">Убрать из плейлиста</button>
      <button class="track-menu-item remove" id="trackMenuDeleteButton" type="button" data-track-menu-action="delete-track">Удалить из медиатеки</button>
    </section>
  </div>

  <div class="mini-player is-hidden" id="miniPlayer">
    <div class="mini-player-cover">
      <img id="heroCover" alt="Обложка текущего трека">
      <div class="placeholder-art" id="heroPlaceholder" aria-hidden="true">
        <span>SK</span>
      </div>
    </div>

    <div class="mini-player-copy">
      <h3 id="heroTitle">Ничего не играет</h3>
      <p id="heroArtist"></p>
    </div>

    <div class="mini-player-controls">
      <button class="ghost-button icon-button" id="prevTrackButton" type="button" aria-label="Предыдущий трек">&lt;&lt;</button>
      <button class="primary-button icon-button" id="playPauseButton" type="button" disabled">&gt;</button>
      <button class="ghost-button icon-button" id="nextTrackButton" type="button" aria-label="Следующий трек">&gt;&gt;</button>
    </div>

    <div class="mini-player-progress">
      <input
        id="progressInput"
        type="range"
        min="0"
        max="100"
        value="0"
        step="0.1"
        aria-label="Прогресс воспроизведения"
      >
      <div class="time-row">
        <span id="currentTimeLabel">0:00</span>
        <span id="durationLabel">0:00</span>
      </div>
    </div>
  </div>

  <nav class="mobile-nav" aria-label="Мобильная навигация">
    <button class="mobile-nav-button is-active" type="button" data-screen-target="home">Home</button>
    <button class="mobile-nav-button" type="button" data-screen-target="library">Library</button>
    <button class="mobile-nav-button" type="button" data-screen-target="statistics">Statistics</button>
  </nav>

  <input id="audioInput" type="file" accept="audio/*" hidden>
  <input id="coverInput" type="file" accept="image/*" hidden>
  <input id="playlistCoverInput" type="file" accept="image/*" hidden>
  <input id="attachAudioInput" type="file" accept="audio/*" hidden>
  <input id="bulkAttachAudioInput" type="file" accept="audio/*" multiple hidden>
  <audio id="audioElement" preload="metadata"></audio>
</body>
</html>
